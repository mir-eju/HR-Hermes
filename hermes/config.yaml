# Copy or symlink this file into your Hermes home, or set HERMES_HOME to a directory that contains it.
# Required: export HR_HERMES_ROOT to this repository root before starting Hermes so paths resolve.
#
# LLM: set OPENROUTER_API_KEY (e.g. in ~/.hermes/.env or your shell). Pick any OpenRouter model slug from https://openrouter.ai/models
#
# Approvals: configure Slack and/or Telegram on each project. Set both webhook secrets here if you use both.

model: "anthropic/claude-sonnet-4"

memory:
  memory_enabled: true
  user_profile_enabled: true

privacy:
  redact_pii: true

cron:
  wrap_response: false

# Scan HR-Hermes skill markdown (global + per-project) alongside bundled Hermes skills.
skills:
  external_dirs:
    - "${HR_HERMES_ROOT}/hermes/skills"

mcp_servers:
  firestore:
    command: "node"
    args:
      - "${HR_HERMES_ROOT}/mcp-servers/firestore-mcp/dist/index.js"
    env:
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
      FIREBASE_SERVICE_ACCOUNT_PATH: "${FIREBASE_SERVICE_ACCOUNT_PATH}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      GUARDRAIL_PORT: "${GUARDRAIL_PORT}"
      LOG_LEVEL: "${LOG_LEVEL}"
      HR_HERMES_ROOT: "${HR_HERMES_ROOT}"
  gmail:
    command: "node"
    args:
      - "${HR_HERMES_ROOT}/mcp-servers/composio-gmail-mcp/dist/index.js"
    env:
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
      FIREBASE_SERVICE_ACCOUNT_PATH: "${FIREBASE_SERVICE_ACCOUNT_PATH}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      GUARDRAIL_PORT: "${GUARDRAIL_PORT}"
      LOG_LEVEL: "${LOG_LEVEL}"
      HR_HERMES_ROOT: "${HR_HERMES_ROOT}"
      DRY_RUN: "${DRY_RUN}"
      COMPOSIO_API_KEY: "${COMPOSIO_API_KEY}"
  trello:
    command: "node"
    args:
      - "${HR_HERMES_ROOT}/mcp-servers/trello-mcp/dist/index.js"
    env:
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
      FIREBASE_SERVICE_ACCOUNT_PATH: "${FIREBASE_SERVICE_ACCOUNT_PATH}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      GUARDRAIL_PORT: "${GUARDRAIL_PORT}"
      LOG_LEVEL: "${LOG_LEVEL}"
      HR_HERMES_ROOT: "${HR_HERMES_ROOT}"
  slack:
    command: "node"
    args:
      - "${HR_HERMES_ROOT}/mcp-servers/slack-mcp/dist/index.js"
    env:
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
      FIREBASE_SERVICE_ACCOUNT_PATH: "${FIREBASE_SERVICE_ACCOUNT_PATH}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      GUARDRAIL_PORT: "${GUARDRAIL_PORT}"
      LOG_LEVEL: "${LOG_LEVEL}"
      HR_HERMES_ROOT: "${HR_HERMES_ROOT}"
  telegram:
    command: "node"
    args:
      - "${HR_HERMES_ROOT}/mcp-servers/telegram-mcp/dist/index.js"
    env:
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
      FIREBASE_SERVICE_ACCOUNT_PATH: "${FIREBASE_SERVICE_ACCOUNT_PATH}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      GUARDRAIL_PORT: "${GUARDRAIL_PORT}"
      LOG_LEVEL: "${LOG_LEVEL}"
      HR_HERMES_ROOT: "${HR_HERMES_ROOT}"
